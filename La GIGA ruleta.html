<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ruleta Personalizable</title>
    <link rel="stylesheet" href="Estilos rula.css">
</head>

<body>

    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <input
    type="file"
    id="importFile"
    accept=".json"
    style="display:none"
    >  

<div class="menu-opciones">

    <button id="btnOpciones">
        ⚙️ Opciones
    </button>

    <div id="panelOpciones" class="panel-opciones oculto">

        <button id="barajar">🔀 Barajar participantes</button>

        <button id="ordenar">🔤 Ordenar alfabéticamente</button>

        <button id="resetearRuleta">
            ♻️ Restaurar original
        </button>

        <hr>

        <button id="actualizar">➕ Agregar campos</button>

        <div id="panelAgregar" class="oculto">

        <div id="listaParticipantes"></div>

        <input type="text" id="nuevoNombre" placeholder="Nuevo participante">

        <button id="agregarUno">➕ Añadir</button>

        <button id="eliminarSeleccionados">🗑️ Eliminar seleccionados</button>

        <button id="exportarRuleta">
           💾 Exportar ruleta
        </button>

        <button id="importarRuleta">
           📂 Importar ruleta
        </button>

        <button id="compartirRuleta">
          🔗 Compartir ruleta
        </button>

        </div>

        <div id="controlVolumen">
           <span id="iconoVolumen" style="cursor: pointer;">🔊</span>
           <input type="range" id="volumen" min="0" max="1" step="0.1" value="1">
         </div>

    </div>

</div>

<div class="contenedor">

    <canvas id="ruleta" width="600" height="600" aria-label="Ruleta de selección"></canvas>

    <div class="flecha"></div>

    <button id="girar" type="button">GIRAR</button>

    <h2 id="resultado"></h2>

</div>

<div id="popupGanador" class="popup oculto">

    <div class="popup-contenido">

        <h2>🎉 Ganador 🎉</h2>

        <img id="imagenGanador" src="" alt="">

        <h3 id="nombreGanador"></h3>

       <div class="popup-botones">
        <button id="cerrarPopup">
            Cerrar
        </button>

        <button id="volverAGirar">
            🔄 Volver a girar
        </button>
       </div>

    </div>

</div>


<div id="panelHistorial">
    <div id="historialHeader">
        <h3>Historial</h3>
        <button id="borrarHistorial">🗑️ Borrar Historial</button>
    </div>
    <div id="listaHistorial"></div>
</div>

<div id="popupHistorial" class="popup oculto">
    <div class="popup-contenido">
        <img id="imagenHistorial" src="" alt="" style="max-width:200px; max-height:200px;">
        <h3 id="nombreHistorial"></h3>
        <button id="cerrarPopupHistorial">Cerrar</button>
    </div>
</div>

<audio id="spinSound" src="spin.mp3" preload="auto"></audio>
<audio id="winSound" src="win.mp3" preload="auto"></audio>


<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="ruleta-personalizada.js"></script>


</body>
</html>
