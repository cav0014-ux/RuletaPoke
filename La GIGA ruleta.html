<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="Assets/icono-web.png">
    <meta charset="UTF-8">
    <title>Ruleta Personalizable</title>
    <link rel="stylesheet" href="Estilos rula.css">
</head>

<body>
    <script>
    const bg = localStorage.getItem("ultimoBg");
    if (bg) {
        document.body.style.background = bg;
        window.addEventListener("DOMContentLoaded", () => {
            document.body.style.background = "";
        });
    }
    </script>
    
    <div id="pantallaCarga">
    <div id="cargaContenido">
        <div id="cargaIcono">🎡</div>
        <div id="cargaTexto">Cargando...</div>
        <div id="cargaBarra"><div id="cargaProgreso"></div></div>
    </div>
</div>

    <button id="btnTemas">🎨</button>

<div id="popupTemas" class="popup oculto">
    <div class="popup-contenido">
        <h3>Elige un estilo</h3>
        <div class="popup-botones" style="flex-wrap:wrap;">
            <button data-tema="retro">⚡ Pokémon</button>
            <button data-tema="circo">🎪 Circo</button>
            <button data-tema="casino">🎰 Casino</button>
            <button data-tema="safari">🌿 Safari</button>
            <button data-tema="piratas">🏴‍☠️ Piratas</button>
            <button data-tema="halloween">🎃 Halloween</button>
        </div>
        <div class="popup-botones" style="margin-top:10px;">
            <button id="cerrarPopupTemas">Cerrar</button>
        </div>
    </div>
</div>

    <div class="bg-superball"></div>
 <div class="bg-superball bg-superball-2"></div>
    
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <input type="file" id="importFile" accept=".json" style="display:none">

    <div class="contenedor">
        <div id="contenedorTitulo">
        <img src="Assets/ZACIAN_1.png" class="sprite-titulo">
        <h1 id="tituloRuleta">

   <svg width="400" height="50" id="svgTitulo" style="display:none" viewBox="0 0 600 50" preserveAspectRatio="xMidYMid meet">
    <defs>
        <pattern id="rayasCirco" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <rect width="20" height="40" fill="#ffffff"/>
            <rect x="20" width="20" height="40" fill="#c0392b"/>
        </pattern>
    </defs>
    <text id="svgTituloTexto" x="300" y="38" text-anchor="middle" font-size="38" font-weight="900" font-style="italic" fill="url(#rayasCirco)" font-family="Fredoka, Arial, sans-serif">Ruleta Mega-loca</text>
</svg>
        <span id="tituloTexto">Ruleta Mega-loca</span>
    </h1>

        <img src="Assets/ZACIAN_1.png" class="sprite-titulo sprite-titulo-derecha">
        </div>
        <canvas id="ruleta" width="800" height="800" aria-label="Ruleta de selección"></canvas>
        <div class="flecha"></div>
        <button id="girar" type="button">GIRAR</button>
        <h2 id="resultado"></h2>
    </div>

    <button id="togglePanel"><img src="Assets/LUVDISC.png" style="width:45px; height:45px; vertical-align:middle; filter: drop-shadow(2px 0 0 #000) drop-shadow(-2px 0 0 #000) drop-shadow(0 2px 0 #000) drop-shadow(0 -2px 0 #000);"></button>

    <div id="panelLateral">

        <button id="barajar" class="btn-rojo"><img src="Assets/superball.png" style="width:28px; vertical-align:middle;"> Barajar participantes</button>
        <button id="ordenar" class="btn-negro"><img src="Assets/curaball.png" style="width:28px; vertical-align:middle;"> Ordenar alfabéticamente</button>
        <button id="resetearRuleta" class="btn-rojo"><img src="Assets/ultraball.png" style="width:28px; vertical-align:middle;"> Restaurar original</button>

        <hr>

        <button id="actualizar" class="btn-negro"><img src="Assets/masterball.png" style="width:28px; vertical-align:middle;"> Agregar campos</button>

        <div id="panelAgregar" class="oculto">
            <div id="listaParticipantes"></div>
            <input type="text" id="nuevoNombre" placeholder="Nuevo participante" maxlength="20" autocomplete="off">
            <input type="file" id="fileInputNuevo" accept="image/*" style="display:none">
            <button id="btnImagenNuevo" type="button" class="btn-rojo"><img src="Assets/SMEARGLE.png" style="width:32px; vertical-align:middle;"> Añadir imagen</button>
            <button id="agregarUno" class="btn-negro"><img src="Assets/FRIENDBALL.png" style="width:28px; vertical-align:middle;"> Añadir</button>
            <button id="eliminarSeleccionados" class="btn-rojo"><img src="Assets/LEFTOVERS.png" style="width:28px; vertical-align:middle;"> Eliminar seleccionados</button>
            <button id="exportarRuleta" class="btn-negro"><img src="Assets/ball_QUICKBALL_open.png" style="width:28px; vertical-align:middle;"> Exportar ruleta</button>
            <button id="importarRuleta" class="btn-rojo"><img src="Assets/DUSKBALL.png" style="width:28px; vertical-align:middle;"> Importar ruleta</button>
            <button id="compartirRuleta" class="btn-negro"><img src="Assets/FASTBALL.png" style="width:28px; vertical-align:middle;"> Compartir ruleta</button>
        </div>

        <div id="controlVolumen">
            <span id="iconoVolumen" style="cursor: pointer;">🔊</span>
            <input type="range" id="volumen" min="0" max="1" step="0.1" value="1">
        </div>

    </div>

    <div id="popupGanador" class="popup oculto">
        <div class="popup-contenido">
            <h2>🎉 Ganador 🎉</h2>
            <img id="imagenGanador" src="" alt="">
            <h3 id="nombreGanador"></h3>
            <div class="popup-botones">
                <button id="cerrarPopup">Cerrar</button>
                <button id="volverAGirar">🔄 Volver a girar</button>
            </div>
        </div>
    </div>

    <div id="popupHistorial" class="popup oculto">
        <div class="popup-contenido">
            <img id="imagenHistorial" src="" alt="">
            <h3 id="nombreHistorial"></h3>
            <button id="cerrarPopupHistorial">Cerrar</button>
        </div>
    </div>

    <div id="popupError" class="popup oculto">
        <div class="popup-contenido">
            <h3 id="mensajeError"></h3>
            <button id="cerrarPopupError">Cerrar</button>
        </div>
    </div>

    <div id="panelHistorial">
        <div id="historialHeader">
            <div class="historial-titulo-fila">
                 <h3><img src="Assets/ZAMAZENTA_1.png" style="width:30px; vertical-align:middle;"> Historial</h3>
                 <button id="toggleHistorial">▼</button>
            </div>
            <button id="borrarHistorial">🗑️ Borrar Historial</button>
        </div>
        <div id="listaHistorial"></div>
    </div>

    <div id="popupImagenGrande" class="popup oculto" style="background:rgba(0,0,0,0.95);">
    <div style="position:relative;">
        <img id="imagenGrande" src="" alt="" style="max-width:90vw; max-height:90vh; object-fit:contain; border: none">
        <button id="cerrarImagenGrande" style="position:absolute; top:-15px; right:-15px; background:#e74c3c; color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-size:16px;">✕</button>
    </div>
</div>

<div id="popupConfirmarEliminar" class="popup oculto">
    <div class="popup-contenido">
        <h3>¿Eliminar el/los elemento/s seleccionado/s?</h3>
        <div class="popup-botones">
            <button id="confirmarEliminar">Sí, eliminar</button>
            <button id="cancelarEliminar">Cancelar</button>
        </div>
    </div>
</div>

<div id="popupEditar" class="popup oculto">
    <div class="popup-contenido">
        <h3>¿Qué quieres editar?</h3>
        <div class="popup-botones">
            <button id="editarTextoBtn">✏️ Editar texto</button>
            <button id="editarImagenBtn">🖼️ Editar imagen</button>
        </div>
        <div class="popup-botones" style="margin-top:10px;">
            <button id="cancelarEditar">Cancelar</button>
        </div>
    </div>
</div>

<div id="popupConfirmarHistorial" class="popup oculto">
    <div class="popup-contenido">
        <h3>¿Borrar todo el historial?</h3>
        <div class="popup-botones">
            <button id="confirmarBorrarHistorial">Sí, borrar</button>
            <button id="cancelarBorrarHistorial">Cancelar</button>
        </div>
    </div>
</div>

<div id="popupConfirmarRestaurar" class="popup oculto">
    <div class="popup-contenido">
        <h3>¿Restaurar la ruleta original?</h3>
        <div class="popup-botones">
            <button id="confirmarRestaurar">Sí, restaurar</button>
            <button id="cancelarRestaurar">Cancelar</button>
        </div>
    </div>
</div>

<div id="popupExportar" class="popup oculto">
    <div class="popup-contenido">
        <h3>Nombre del archivo</h3>
        <input type="text" id="nombreArchivoExportar" value="mi-ruleta" maxlength="30" class="input-editar">
        <div class="popup-botones">
            <button id="confirmarExportar">💾 Guardar</button>
            <button id="cancelarExportar">Cancelar</button>
        </div>
    </div>
</div>

<div id="popupCompartir" class="popup oculto">
    <div class="popup-contenido">
        <h3>✅ Tu ruleta se ha copiado con éxito al portapapeles</h3>
        <div class="popup-botones">
            <button id="cerrarPopupCompartir">Aceptar</button>
        </div>
    </div>
</div>


    <audio id="spinSound" src="spin.mp3" preload="auto"></audio>
    <audio id="winSound" src="win.mp3" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="ruleta-personalizada.js"></script>

</body>
</html>
